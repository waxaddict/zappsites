<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!--
    Bluebird Bakery — circular badge logo
    Brand colours extracted from print flyer:
      Deep purple  #9B6BBE  (main background / brand)
      Light lilac  #C699E2  (badge mark / accent)
      White        #FFFFFF  (large display text)
    SVG renders the badge in deep purple on transparent background.
  -->
  <defs>
    <!-- Clockwise full circle from top — for BLUEBIRD BAKERY (top arc) -->
    <path id="topRing"
      d="M 120,22 A 98,98 0 1,1 119.999,22" fill="none"/>
    <!-- Counter-clockwise full circle from top — for GOOD BAKED GOODS (bottom arc, readable) -->
    <path id="bottomRing"
      d="M 120,22 A 98,98 0 1,0 119.999,22" fill="none"/>
  </defs>

  <!-- ── Outer ring ── -->
  <circle cx="120" cy="120" r="108" fill="none" stroke="#9B6BBE" stroke-width="4"/>
  <!-- ── Inner thin ring ── -->
  <circle cx="120" cy="120" r="100" fill="none" stroke="#9B6BBE" stroke-width="1.2"/>

  <!-- ── BLUEBIRD BAKERY — top curved text ── -->
  <text font-family="'Gill Sans','Century Gothic','Futura',sans-serif"
        font-size="13.5" font-weight="600" fill="#9B6BBE"
        letter-spacing="3.2">
    <textPath href="#topRing" startOffset="50%" text-anchor="middle">BLUEBIRD BAKERY</textPath>
  </text>

  <!-- ── · GOOD BAKED GOODS · — bottom curved text ── -->
  <text font-family="'Gill Sans','Century Gothic','Futura',sans-serif"
        font-size="11.5" font-weight="400" fill="#9B6BBE"
        letter-spacing="2.2">
    <textPath href="#bottomRing" startOffset="50%" text-anchor="middle">· GOOD BAKED GOODS ·</textPath>
  </text>

  <!-- ══════════════════════════════════════
       LEFT WHEAT STALK
       Centred ~(88, 118), leaning slightly left
       ══════════════════════════════════════ -->
  <g transform="translate(88,120)" fill="#9B6BBE" stroke="#9B6BBE" stroke-linecap="round">
    <!-- Stem -->
    <line x1="0" y1="22" x2="0" y2="-26" stroke-width="1.6" fill="none"/>
    <!-- Tip grain -->
    <ellipse cx="0" cy="-29" rx="3" ry="6" transform="rotate(0)"/>
    <!-- Grain pairs from top to bottom -->
    <ellipse cx="-5" cy="-19" rx="3.5" ry="6.5" transform="rotate(-38 -5 -19)"/>
    <ellipse cx="5"  cy="-19" rx="3.5" ry="6.5" transform="rotate(38 5 -19)"/>
    <ellipse cx="-5" cy="-8"  rx="3.5" ry="6.5" transform="rotate(-38 -5 -8)"/>
    <ellipse cx="5"  cy="-8"  rx="3.5" ry="6.5" transform="rotate(38 5 -8)"/>
    <ellipse cx="-5" cy="3"   rx="3.5" ry="6"   transform="rotate(-38 -5 3)"/>
    <ellipse cx="5"  cy="3"   rx="3.5" ry="6"   transform="rotate(38 5 3)"/>
    <!-- Leaf at base -->
    <path d="M 0,14 Q -8,6 -2,0" stroke-width="1.2" fill="none"/>
  </g>

  <!-- ══════════════════════════════════════
       RIGHT WHEAT STALK (mirrored)
       ══════════════════════════════════════ -->
  <g transform="translate(152,120) scale(-1,1)" fill="#9B6BBE" stroke="#9B6BBE" stroke-linecap="round">
    <line x1="0" y1="22" x2="0" y2="-26" stroke-width="1.6" fill="none"/>
    <ellipse cx="0" cy="-29" rx="3" ry="6"/>
    <ellipse cx="-5" cy="-19" rx="3.5" ry="6.5" transform="rotate(-38 -5 -19)"/>
    <ellipse cx="5"  cy="-19" rx="3.5" ry="6.5" transform="rotate(38 5 -19)"/>
    <ellipse cx="-5" cy="-8"  rx="3.5" ry="6.5" transform="rotate(-38 -5 -8)"/>
    <ellipse cx="5"  cy="-8"  rx="3.5" ry="6.5" transform="rotate(38 5 -8)"/>
    <ellipse cx="-5" cy="3"   rx="3.5" ry="6"   transform="rotate(-38 -5 3)"/>
    <ellipse cx="5"  cy="3"   rx="3.5" ry="6"   transform="rotate(38 5 3)"/>
    <path d="M 0,14 Q -8,6 -2,0" stroke-width="1.2" fill="none"/>
  </g>

  <!-- ══════════════════════════════════════
       BIRD FOOTPRINTS (two Y-shaped tracks)
       Like bluebird / thrush prints
       ══════════════════════════════════════ -->
  <!-- Left print (slightly lower, stepping forward) -->
  <g transform="translate(108,126)" stroke="#9B6BBE" stroke-width="2.2"
     stroke-linecap="round" fill="none">
    <!-- Three forward toes -->
    <line x1="0" y1="0" x2="-7"  y2="-12"/>
    <line x1="0" y1="0" x2="0"   y2="-14"/>
    <line x1="0" y1="0" x2="7"   y2="-12"/>
    <!-- Hind toe -->
    <line x1="0" y1="0" x2="0"   y2="6"/>
  </g>
  <!-- Right print (slightly higher, other foot) -->
  <g transform="translate(132,112)" stroke="#9B6BBE" stroke-width="2.2"
     stroke-linecap="round" fill="none">
    <line x1="0" y1="0" x2="-7"  y2="-12"/>
    <line x1="0" y1="0" x2="0"   y2="-14"/>
    <line x1="0" y1="0" x2="7"   y2="-12"/>
    <line x1="0" y1="0" x2="0"   y2="6"/>
  </g>
</svg>
